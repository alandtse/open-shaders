name: "Release: Prebuilt Shader Cache"

# Packages the ShaderCache artifacts produced by the release build's shader
# validation (which compiles at release parity when cache-artifacts is set --
# one compile serves validation AND distribution) and attaches them to the
# release. Issue #148.

on:
    workflow_dispatch:
        inputs:
            tag:
                description: "Release tag to attach caches to (e.g. v1.7.1)"
                required: true
            run-id:
                description: "release-build run id that produced the ShaderCache artifacts"
                required: true

permissions:
    contents: write

jobs:
    attach-cache:
        runs-on: ubuntu-latest
        strategy:
            matrix:
                runtime: [SE, VR]
        steps:
            - name: Download cache artifact
              uses: actions/download-artifact@v6
              with:
                  name: ShaderCache-${{ matrix.runtime }}
                  path: ShaderCache
                  run-id: ${{ inputs.run-id }}
                  github-token: ${{ github.token }}

            - name: Package and attach
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  NAME="ShaderCache-${{ matrix.runtime }}-${{ inputs.tag }}.7z"
                  7z a -t7z -mx=7 "$NAME" ./ShaderCache
                  gh release upload "${{ inputs.tag }}" "$NAME" --clobber --repo "${{ github.repository }}"
