name: "Nexus: Upload Release"

# Open Shaders fork policy: this workflow uploads ONLY the AIO archive to
# this fork's Nexus mod page. It deliberately does NOT distribute to the
# per-feature Nexus pages owned by upstream / individual maintainers — the
# fork is a single-page release. The AIO itself is filtered at build time
# by `autoupload = true` (see CMakeLists.txt), so features that are not
# yet ready for release are excluded from the bundle.
#
# Defaults reference Open Shaders on Nexus. The Nexus mod page does not
# exist yet — set `nexus_mod_id` via workflow_dispatch input or by
# updating the default below once the page is created.

on:
    workflow_dispatch:
        inputs:
            tag:
                description: "Release tag to upload to Nexus"
                required: true
            nexus_game_id:
                description: "Nexus game ID"
                required: false
                default: "skyrimspecialedition"
            nexus_mod_id:
                description: "Open Shaders Nexus mod ID (override the default until the page is created)"
                required: false
                default: ""
            artifact_pattern:
                description: "AIO artifact glob in the GitHub release"
                required: false
                default: "CommunityShaders_AIO-*.7z"
            mod_filename:
                description: "Filename used for the Nexus mod upload"
                required: false
                default: "Open Shaders"
            dry_run:
                description: "If true, do not upload to Nexus; only report the planned upload"
                required: false
                type: choice
                default: "true"
                options:
                    - "true"
                    - "false"
            changelog:
                description: "Optional release notes or changelog for Nexus"
                required: false
    workflow_call:
        inputs:
            tag:
                description: "Release tag to upload to Nexus"
                required: true
                type: string
            nexus_game_id:
                required: false
                type: string
                default: "skyrimspecialedition"
            nexus_mod_id:
                required: false
                type: string
                default: ""
            artifact_pattern:
                required: false
                type: string
                default: "CommunityShaders_AIO-*.7z"
            mod_filename:
                required: false
                type: string
                default: "Open Shaders"
            dry_run:
                required: false
                type: string
                default: "true"
            changelog:
                required: false
                type: string
                default: ""
        secrets:
            UNEX_NEXUSMODS_SESSION_COOKIE:
                required: false
            UNEX_APIKEY:
                required: false

jobs:
    prepare:
        runs-on: ubuntu-latest
        outputs:
            tag: ${{ steps.resolve.outputs.tag }}
            version: ${{ steps.resolve.outputs.version }}
            dry_run: ${{ steps.dryrun.outputs.dry_run }}
            nexus_mod_id: ${{ steps.guard.outputs.nexus_mod_id }}
            file_description: ${{ steps.body.outputs.file_description }}
            changelog: ${{ steps.body.outputs.changelog }}
            should_upload: ${{ steps.guard.outputs.should_upload }}
        steps:
            - name: Checkout repository
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: Resolve release tag
              id: resolve
              run: |
                  set -euo pipefail
                  TAG="$INPUT_TAG"
                  if [ -z "$TAG" ]; then
                    echo "::error::No tag provided for Nexus upload"
                    exit 1
                  fi
                  if [[ "$TAG" == *-* ]]; then
                    echo "::error::'$TAG' is a pre-release tag. Only stable releases are uploaded to Nexus."
                    exit 1
                  fi
                  DRAFT=$(gh api "repos/$GITHUB_REPOSITORY/releases" \
                    --jq ".[] | select(.tag_name == \"$TAG\") | .draft" 2>/dev/null | head -1)
                  if [ "$DRAFT" != "false" ]; then
                    echo "::error::Release '$TAG' is not published. Publish the GitHub release before uploading to Nexus."
                    exit 1
                  fi
                  VERSION="${TAG#v}"
                  echo "tag=$TAG" >> "$GITHUB_OUTPUT"
                  echo "version=$VERSION" >> "$GITHUB_OUTPUT"
              env:
                  INPUT_TAG: ${{ inputs.tag || '' }}
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Compute dry-run mode
              id: dryrun
              run: |
                  if [ "$INPUT_DRY_RUN" = "false" ]; then
                    echo "dry_run=false" >> "$GITHUB_OUTPUT"
                  else
                    echo "dry_run=true" >> "$GITHUB_OUTPUT"
                  fi
              env:
                  INPUT_DRY_RUN: ${{ inputs.dry_run || '' }}

            - name: Guard against unset mod ID
              id: guard
              env:
                  INPUT_MOD_ID: ${{ inputs.nexus_mod_id || '' }}
                  DRY_RUN: ${{ steps.dryrun.outputs.dry_run }}
              run: |
                  set -euo pipefail
                  MOD_ID="${INPUT_MOD_ID}"
                  if [ -z "${MOD_ID}" ]; then
                    if [ "${DRY_RUN}" = "true" ]; then
                      echo "::warning::nexus_mod_id is empty — dry-run continues but a real upload would fail. Set the fork's Nexus mod ID via workflow input or in the default."
                      echo "should_upload=false" >> "$GITHUB_OUTPUT"
                      echo "nexus_mod_id=" >> "$GITHUB_OUTPUT"
                    else
                      echo "::error::nexus_mod_id is empty. Set the fork's Nexus mod ID via the workflow input (e.g. dispatch with nexus_mod_id=NNNNN), or update the default in nexus-upload.yaml once the Open Shaders Nexus page exists."
                      exit 1
                    fi
                  else
                    echo "nexus_mod_id=${MOD_ID}" >> "$GITHUB_OUTPUT"
                    echo "should_upload=true" >> "$GITHUB_OUTPUT"
                  fi

            - name: Build changelog and file description
              id: body
              env:
                  RELEASE_TAG: ${{ steps.resolve.outputs.tag }}
                  RELEASE_VERSION: ${{ steps.resolve.outputs.version }}
                  INPUT_CHANGELOG: ${{ inputs.changelog || '' }}
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  set -euo pipefail
                  if [ -n "${INPUT_CHANGELOG}" ]; then
                    CHANGELOG="${INPUT_CHANGELOG}"
                  else
                    # Strip the feature audit appendix so the Nexus changelog
                    # only contains human-readable notes.
                    gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${RELEASE_TAG}" \
                      --jq '.body // ""' > /tmp/release-body.md
                    python3 -c "
                  import re, sys
                  body = open('/tmp/release-body.md').read()
                  body = re.sub(r'\n---\n+# Feature Version Audit\b.*', '', body, flags=re.DOTALL).strip()
                  sys.stdout.write(body)
                  " > /tmp/release-body-clean.md
                    CHANGELOG=$(cat /tmp/release-body-clean.md)
                  fi
                  FILE_DESC="Open Shaders ${RELEASE_VERSION} AIO — fork of Community Shaders. See changelog for included features."

                  # Multiline output via heredoc.
                  DELIM=$(openssl rand -hex 8)
                  {
                    printf 'changelog<<%s\n%s\n%s\n' "${DELIM}" "${CHANGELOG}" "${DELIM}"
                    printf 'file_description=%s\n' "${FILE_DESC}"
                  } >> "$GITHUB_OUTPUT"

    dry-run-check:
        needs: prepare
        if: needs.prepare.outputs.dry_run == 'true'
        runs-on: ubuntu-latest
        steps:
            - name: Report planned upload
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  UNEX_APIKEY: ${{ secrets.UNEX_APIKEY }}
                  RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
                  RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
                  NEXUS_GAME_ID: ${{ inputs.nexus_game_id || 'skyrimspecialedition' }}
                  NEXUS_MOD_ID: ${{ needs.prepare.outputs.nexus_mod_id }}
                  ARTIFACT_PATTERN: ${{ inputs.artifact_pattern || 'CommunityShaders_AIO-*.7z' }}
                  MOD_FILENAME: ${{ inputs.mod_filename || 'Open Shaders' }}
              run: |
                  set -euo pipefail
                  mkdir -p release-assets
                  gh release download "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" \
                    --pattern "${ARTIFACT_PATTERN}" --dir release-assets || true
                  ASSET=$(find release-assets -maxdepth 1 -name "${ARTIFACT_PATTERN}" | sort | head -n1 || true)
                  {
                    echo "## Dry Run — Planned Nexus Upload"
                    echo ""
                    echo "| Field | Value |"
                    echo "|-------|-------|"
                    echo "| Tag | \`${RELEASE_TAG}\` |"
                    echo "| Version | \`${RELEASE_VERSION}\` |"
                    echo "| Game | \`${NEXUS_GAME_ID}\` |"
                    echo "| Mod ID | \`${NEXUS_MOD_ID:-<unset>}\` |"
                    echo "| Mod filename | \`${MOD_FILENAME}\` |"
                    echo "| Artifact pattern | \`${ARTIFACT_PATTERN}\` |"
                    echo "| Resolved artifact | \`${ASSET:-<missing>}\` |"
                    echo ""
                    if [ -z "${ASSET}" ]; then
                      echo "⚠️ No artifact matched \`${ARTIFACT_PATTERN}\` on release \`${RELEASE_TAG}\`."
                      echo "Available release assets:"
                      gh release view "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" --json assets --jq '.assets[].name' | sed 's/^/- /'
                    fi
                  } >> "$GITHUB_STEP_SUMMARY"

                  if [ -n "${UNEX_APIKEY}" ] && [ -n "${NEXUS_MOD_ID}" ]; then
                    python3 << 'PYEOF'
                  import json, os, urllib.request, urllib.error
                  game_id = os.environ['NEXUS_GAME_ID']
                  mod_id = os.environ['NEXUS_MOD_ID']
                  planned = os.environ['RELEASE_VERSION']
                  api_key = os.environ['UNEX_APIKEY']
                  api_url = f'https://api.nexusmods.com/v1/games/{game_id}/mods/{mod_id}/files.json'
                  req = urllib.request.Request(api_url, headers={
                      'apikey': api_key,
                      'User-Agent': 'open-shaders-ci/1.0',
                      'Accept': 'application/json',
                  })
                  summary = open(os.environ['GITHUB_STEP_SUMMARY'], 'a')
                  try:
                      with urllib.request.urlopen(req, timeout=15) as resp:
                          data = json.load(resp)
                      versions = sorted({f.get('version','') for f in data.get('files', []) if f.get('version')})
                      status = '✅ already on Nexus (will skip)' if planned in versions else '🆕 new upload'
                      summary.write(f'\n### Nexus version check\n- Planned: `{planned}`\n- Status: {status}\n- Existing: {", ".join(versions[-5:]) or "—"}\n')
                  except urllib.error.HTTPError as e:
                      summary.write(f'\n### Nexus version check\n- ❌ HTTP {e.code}\n')
                  except Exception as e:
                      summary.write(f'\n### Nexus version check\n- ❌ {e}\n')
                  summary.close()
                  PYEOF
                  fi

    upload-to-nexus:
        # Reusable workflow call: runs-on is omitted (defined by the called workflow).
        needs: prepare
        if: >
            needs.prepare.outputs.dry_run != 'true' &&
            needs.prepare.outputs.should_upload == 'true'
        uses: alandtse/nexus-workflows/.github/workflows/upload-nexus.yml@main
        with:
            nexus_game_id: ${{ inputs.nexus_game_id || 'skyrimspecialedition' }}
            nexus_mod_id: ${{ needs.prepare.outputs.nexus_mod_id }}
            artifact_name: ""
            artifact_pattern: ${{ inputs.artifact_pattern || 'CommunityShaders_AIO-*.7z' }}
            tag_name: ${{ needs.prepare.outputs.tag }}
            mod_version: ${{ needs.prepare.outputs.version }}
            mod_filename: ${{ inputs.mod_filename || 'Open Shaders' }}
            changelog: ${{ needs.prepare.outputs.changelog }}
            file_description: ${{ needs.prepare.outputs.file_description }}
            check_existing: true
        secrets:
            UNEX_NEXUSMODS_SESSION_COOKIE: ${{ secrets.UNEX_NEXUSMODS_SESSION_COOKIE }}
            UNEX_APIKEY: ${{ secrets.UNEX_APIKEY }}

    upload-summary:
        name: Upload Summary
        runs-on: ubuntu-latest
        needs: [prepare, upload-to-nexus]
        if: always() && needs.prepare.result == 'success'
        steps:
            - name: Summarize
              run: |
                  {
                    echo "## Nexus Upload Summary"
                    echo ""
                    echo "**Workflow:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    echo "**Tag:** ${{ needs.prepare.outputs.tag }}"
                    echo "**Dry run:** ${{ needs.prepare.outputs.dry_run }}"
                    echo "**Mod ID:** ${{ needs.prepare.outputs.nexus_mod_id }}"
                    echo ""
                    if [ "${{ needs.prepare.outputs.dry_run }}" = "true" ]; then
                      echo "ℹ️ Dry run — no files were uploaded to Nexus."
                      echo "Re-run with \`dry_run: false\` to perform the upload."
                    elif [ "${{ needs.upload-to-nexus.result }}" = "success" ]; then
                      echo "✅ AIO uploaded to Nexus mod ${{ needs.prepare.outputs.nexus_mod_id }}."
                    else
                      echo "❌ Upload job did not succeed (result: ${{ needs.upload-to-nexus.result }})."
                    fi
                  } >> "$GITHUB_STEP_SUMMARY"
