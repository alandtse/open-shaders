name: "Auto-rebase open PRs"

# Rebase open PRs targeting `dev` whenever `dev` moves. Wraps
# peter-evans/rebase@v3 instead of hand-rolling the rebase loop. Triggered by:
#   - Push to `dev` (including the rebase-forward push from
#     release-semantic.yaml after a hotfix release).
#   - Manual dispatch (recovery after a missed run, or to target a single PR).
#
# Permissions / forks: pushing to a PR head branch on a fork requires a
# user PAT belonging to a maintainer of this repo AND the PR author to
# have left "Allow edits by maintainers" checked. peter-evans/rebase
# silently skips PRs that don't meet both conditions; failed-conflict
# PRs are skipped too (no force-push attempted). The `rebased-count`
# output is surfaced in the job summary.
#
# Token: RELEASE_PAT is reused (same scopes the release workflows need).
# Required PAT scopes (classic): `repo` + `workflow`. The `workflow`
# scope matters because a rebased PR may include `.github/workflows/`
# changes; force-pushing those without it would fail with "refusing to
# allow a Personal Access Token to create or update workflow".

on:
    push:
        branches: [dev]
    workflow_dispatch:
        inputs:
            pr_number:
                description: "Optional: rebase just this PR number (the action accepts head as `<owner>:<branch>`; we resolve via gh api). Leave empty to rebase all open PRs against dev."
                required: false
                default: ""

permissions:
    contents: write
    pull-requests: write

concurrency:
    # Serialize so two back-to-back pushes to dev don't race and produce
    # interleaved force-pushes on the same PR.
    group: auto-rebase-prs
    cancel-in-progress: false

jobs:
    rebase:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0
                  token: ${{ secrets.RELEASE_PAT }}

            - name: Resolve single-PR head spec (if pr_number given)
              id: resolve_head
              if: inputs.pr_number != ''
              env:
                  GH_TOKEN: ${{ secrets.RELEASE_PAT }}
                  PR_NUMBER: ${{ inputs.pr_number }}
              run: |
                  set -euo pipefail
                  # Validate the PR is open AND targets dev before
                  # rebasing — manual mode could otherwise rewrite a
                  # PR that targets a different base (e.g. a hotfix
                  # staging branch) and silently corrupt it.
                  PR_JSON=$(gh pr view "${PR_NUMBER}" --repo '${{ github.repository }}' \
                    --json state,baseRefName,headRepositoryOwner,headRefName)
                  PR_STATE=$(echo "${PR_JSON}" | jq -r '.state')
                  PR_BASE=$(echo "${PR_JSON}" | jq -r '.baseRefName')
                  if [[ "${PR_STATE}" != "OPEN" ]]; then
                    echo "::warning::PR #${PR_NUMBER} is ${PR_STATE}, not OPEN — skipping."
                    echo "head=" >> "$GITHUB_OUTPUT"
                    exit 0
                  fi
                  if [[ "${PR_BASE}" != "dev" ]]; then
                    echo "::warning::PR #${PR_NUMBER} targets '${PR_BASE}', not 'dev' — skipping to avoid rebasing the wrong base."
                    echo "head=" >> "$GITHUB_OUTPUT"
                    exit 0
                  fi
                  HEAD_REF=$(echo "${PR_JSON}" | jq -r '"\(.headRepositoryOwner.login):\(.headRefName)"')
                  echo "head=${HEAD_REF}" >> "$GITHUB_OUTPUT"

            - name: Rebase open PRs against dev
              id: rebase
              # Skip if pr_number was provided but validation rejected it
              # (state != OPEN or base != dev). Without this guard an
              # empty `head` would fall through to the all-PRs default,
              # which is the opposite of what a single-PR caller wanted.
              if: inputs.pr_number == '' || steps.resolve_head.outputs.head != ''
              uses: peter-evans/rebase@v3
              with:
                  # RELEASE_PAT (not GITHUB_TOKEN): GITHUB_TOKEN can't
                  # push to PR head branches on contributor forks, and
                  # would also fail to force-push workflow file changes
                  # without the `workflow` scope. See workflow header.
                  token: ${{ secrets.RELEASE_PAT }}
                  base: dev
                  head: ${{ steps.resolve_head.outputs.head }}
                  exclude-drafts: true
                  exclude-labels: |
                      no-auto-rebase

            - name: Summarize
              env:
                  REBASED: ${{ steps.rebase.outputs.rebased-count }}
              run: |
                  {
                    echo "## Auto-rebase summary"
                    echo ""
                    echo "- PRs rebased: \`${REBASED:-0}\`"
                    echo "- Base: \`dev\`"
                    if [[ -n '${{ inputs.pr_number }}' ]]; then
                      echo "- Targeted single PR: #${{ inputs.pr_number }} (head \`${{ steps.resolve_head.outputs.head }}\`)"
                    fi
                    echo ""
                    echo "PRs not rebased fall into one of three buckets:"
                    echo "- Already up-to-date with \`dev\` (no-op)"
                    echo "- Draft or labeled \`no-auto-rebase\` (excluded)"
                    echo "- Conflict during rebase, OR fork without maintainer-edit access (action silently skips)"
                    echo ""
                    echo "PRs in the conflict bucket need a manual rebase by the author:"
                    echo '```bash'
                    echo "git fetch origin && git rebase origin/dev"
                    echo "# resolve conflicts, git rebase --continue"
                    echo "git push --force-with-lease"
                    echo '```'
                  } >> "$GITHUB_STEP_SUMMARY"
