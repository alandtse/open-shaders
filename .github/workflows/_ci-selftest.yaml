# TEMPORARY — delete before merging the CI resilience PR (#130).
#
# pr-checks runs under pull_request_target, where the workflow AND composite
# actions resolve from the BASE branch (dev) — so a PR can't test its own
# changes to setup-build-environment. This branch-scoped, push-triggered
# workflow runs the BRANCH's version of the composite action, exercising the
# vcpkg download cache + retry pre-install path. Runs only on this branch.
name: "(temp) CI self-test"

on:
    push:
        branches: [ci/vcpkg-download-cache-resilience]
    workflow_dispatch:

permissions:
    contents: read

jobs:
    selftest:
        uses: ./.github/workflows/_shared-build.yaml
        with:
            ref: ${{ github.sha }}
            repository: ${{ github.repository }}
            run-cpp: false
            run-shader-validation: false
            run-shader-tests: false
            run-cpp-tests: true
            cpp-tests-should-build: "true"
